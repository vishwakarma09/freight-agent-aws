service: freight-agent-api
useDotenv: true

provider:
  name: aws
  runtime: python3.11
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-2'}
  environment:
    S3_BUCKET_NAME: "dispatch-private"
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://freight_user:freight_password@localhost:5432/freight_bidding_db'}
    CEREBRAS_API_KEY: ${env:CEREBRAS_API_KEY, 'csk-xxxxxxxxxxxxxxxxxxxxxxxx'}
    REDIS_HOST: ${env:REDIS_HOST, 'localhost'}
    REDIS_PORT: ${env:REDIS_PORT, '6379'}
    SMTP_HOST: ${env:SMTP_HOST, 'localhost'}
    SMTP_PORT: ${env:SMTP_PORT, '1025'}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID, 'xxxxxxxxxxxxxxxxxxxxxxxxx'}
    GOOGLE_CLIENT_SECRET: ${env:GOOGLE_CLIENT_SECRET, 'GOCSPX-xxxxxxxxxxxxxxxxxxxxxxxx'}
  
  # Grant Lambda permissions to access the S3 bucket
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::dispatch-private
            - arn:aws:s3:::dispatch-private/*

package:
  patterns:
    - '!node_modules/**'
    - '!venv/**'
    - '!.venv/**'
    - '!.git/**'
    - '!package-lock.json'
    - '!package.json'
    - '!docs/**'
    - '!uvicorn.log'
    - '!test_api.py'

plugins:
  - serverless-python-requirements


custom:
  pythonRequirements:
    dockerizePip: 'non-linux'
    slim: true
    strip: true
    noDeploy:
      - boto3
      - botocore

functions:
  api:
    handler: app.main.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY
  cron:
    handler: app.main.cron_handler
    events:
      - schedule: rate(10 minutes)

resources:
  Resources:
    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: freight-agent-frontend-${self:provider.stage}-${aws:accountId}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: "*"
              Action:
                - s3:GetObject
              Resource: !Join
                - ""
                - - "arn:aws:s3:::"
                  - !Ref FrontendBucket
                  - "/*"
  Outputs:
    FrontendWebsiteUrl:
      Value: !GetAtt FrontendBucket.WebsiteURL
      Description: URL of the frontend website hosted on S3
